name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Package
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Install .NET Framework Developer Packs
        shell: powershell
        run: |
          choco install netfx-4.8-devpack --yes --no-progress
          choco install netfx-4.8.1-devpack --yes --no-progress

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        run: msbuild /p:Configuration=Release /p:Platform="Any CPU"

      - name: Zip artifacts
        shell: powershell
        run: |
          Compress-Archive -Path Src/Configuration.DkimSigner/bin/Release/* `
            -DestinationPath ./Configuration.DkimSigner.zip
          Compress-Archive -Path Src/Exchange.DkimSigner/bin/Release/* `
            -DestinationPath ./ExchangeDkimSigner.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ./Configuration.DkimSigner.zip
            ./ExchangeDkimSigner.zip
